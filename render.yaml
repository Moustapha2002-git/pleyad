# Render Blueprint — deploys Pleyad as one web service (API + built client).
# The database is external (TiDB Cloud); DATABASE_URL + SESSION_SECRET are set as
# secrets in the Render dashboard, not here. Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pleyad
    runtime: node
    plan: free # spins down when idle (~30s cold start); upgrade to "starter" for always-on
    region: frankfurt # close to the TiDB Cloud region (eu-central-1)
    branch: main
    # `corepack pnpm ...` runs pnpm (version from package.json's packageManager)
    # via corepack's writable cache — avoids `corepack enable` writing to a
    # read-only /usr/bin on Render.
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm -C apps/platform build
    startCommand: corepack pnpm -C apps/platform start
    healthCheckPath: /health
    envVars:
      - key: COREPACK_ENABLE_DOWNLOAD_PROMPT
        value: "0" # let corepack fetch pnpm non-interactively
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # set in the Render dashboard (secret)
      - key: SESSION_SECRET
        sync: false # set in the Render dashboard (secret)
